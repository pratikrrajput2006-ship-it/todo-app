<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="stylesheet" href="/css/home.css" />
  </head>
  <body>
    <div class="product-logo">
      <div class="left">
        <lottie-player
          src="/assets/json/to-do-list.json"
          background="transparent"
          speed="1"
          loop
          autoplay
        >
        </lottie-player>
      </div>
      <h1 id="main-logo">to-do-list</h1>
    </div>
    <div class="container">
      <div class="information">
        <h1 id="title">Build Your Day</h1>
        <p>
          Plan your daily activities with ease. Our to-do system helps you
          prioritize what matters, stay productive, and accomplish your goals
          step by step. Start building a smarter routine today.
        </p>
        <div class="buttons">
          <button
            aria-expanded="false"
            aria-controls="Sign-in"
            id="sign-in"
            class="design"
          >
            Sign-in
          </button>
          <button
            aria-expanded="false"
            aria-controls="Sign-up"
            id="sign-up"
            class="design"
          >
            Sign-up
          </button>
        </div>
      </div>
    </div>
    <div class="form1" id="Sign-in-aria">
      <button class="remove-btn1">
        <img src="/assets/svg/xmark.svg" height="20px" alt="" />
      </button>
      <form class="sign-form" id="Sign-in">
        <div class="contain">
          <h2>Sign in To do</h2>
          <div class="icons">
            <div class="icon">
              <img src="/assets/svg/google.svg" height="20px" />
            </div>
            <div class="icon">
              <img src="/assets/svg/github.svg" height="20px" />
            </div>
            <div class="icon">
              <img src="/assets/svg/facebook.svg" height="20px" />
            </div>
            <div class="icon">
              <img src="/assets/svg/linkedin.svg" height="20px" />
            </div>
          </div>
          <input type="text" name="Name" required />
          <label for="Name" id="one" class="fix">Name:</label>
          <input type="email" name="email" required />
          <label for="email" id="two" class="fix">Email:</label>
          <input type="password" name="password" required />
          <label for="password" id="three" class="fix">Password:</label>
          <button class="design" type="submit">Submit</button>
        </div>
      </form>
    </div>
    <div class="form2" id="Sign-up-aria">
      <button class="remove-btn2">
        <img src="/assets/svg/xmark.svg" height="20px" alt="" />
      </button>
      <form class="sign-form" height="500px" id="Sign-up">
        <div class="contain">
          <h2>Sign up To do</h2>
          <div class="icons">
            <div class="icon">
              <img src="/assets/svg/google.svg" height="20px" />
            </div>
            <div class="icon">
              <img src="/assets/svg/github.svg" height="20px" />
            </div>
            <div class="icon">
              <img src="/assets/svg/facebook.svg" height="20px" />
            </div>
            <div class="icon">
              <img src="/assets/svg/linkedin.svg" height="20px" />
            </div>
          </div>
          <input type="email" name="email" required />
          <label for="email" id="one" class="fix">Email:</label>
          <input type="password" name="password" required />
          <label for="password" id="two" class="fix">Password:</label>
          <button class="design" type="submit">Submit</button>
        </div>
      </form>
    </div>
  </body>
  <script>
    const container=document.querySelector(".container");
    const form1 = document.querySelector(".form1");
    const form2 = document.querySelector(".form2");

    const signinbtn = document.querySelector("#sign-in");
    const signupbtn = document.querySelector("#sign-up");

    const remove1 = document.querySelector(".remove-btn1");
    const remove2 = document.querySelector(".remove-btn2");

    signinbtn.addEventListener("click", () => {
      form1.classList.add("active");
      container.classList.add("blur");
    });
    remove1.addEventListener("click", () => {
      form1.classList.remove("active");
      container.classList.remove("blur");

    });
    signupbtn.addEventListener("click", () => {
      form2.classList.add("active");
      container.classList.add("blur");

    });
    remove2.addEventListener("click", () => {
      form2.classList.remove("active");
      container.classList.remove("blur");

    });
  </script>
</html>
