<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="stylesheet" href="/css/signin.css" />
  </head>
  <body>
    <div class="product-logo">
      <div class="left">
        <lottie-player
          src="/assets/json/to-do-list.json"
          background="transparent"
          speed="1"
          loop
          autoplay
        >
        </lottie-player>
      </div>
      <h1 id="main-logo">To-Do</h1>
    </div>
    <div class="container">
      <div role="tablist" class="bar">
        <div
          role="tab"
          class="tokens"
          aria-controls="one"
          aria-selected="false"
        >
          <img src="/assets/svg/dashbord.svg" height="18px" alt="" srcset="" />
          Dashbord
        </div>
        <div role="tab" class="tokens" aria-controls="two" aria-selected="true">
          <img
            src="/assets/svg/Vital.svg"
            height="18px"
            alt=""
            srcset=""
          />Vital Task
        </div>
        <div
          role="tab"
          class="tokens"
          aria-controls="three"
          aria-selected="false"
        >
          <img src="/assets/svg/task.svg" height="18px" alt="" srcset="" />
          My task
        </div>
        <div
          role="tab"
          class="tokens"
          aria-controls="four"
          aria-selected="false"
        >
          <img src="/assets/svg/cat.svg" height="18px" alt="" srcset="" />
          Task Catagory
        </div>
        <div
          role="tab"
          class="tokens"
          aria-controls="five"
          aria-selected="false"
        >
          <img src="/assets/svg/help.svg" height="18px" alt="" srcset="" />
          Help
        </div>
        <div class="tokens" id="profile">
        <div class="circle"></div>
        <div class="line"></div>
        <div class="email">
          <input type="text" name="email" id="emails" readonly>
        </div>
      </div>
      </div>
      <div class="big-container" role="tabpanel" id="one" hidden>
        <h1>Data is not Available</h1>
      </div>
      <div class="big-container" role="tabpanel" id="two" hidden></div>
      <div class="big-container" role="tabpanel" id="three">
        <div class="details" id="core">
          <div class="core-head">
            <div class="head">
              <img
                src="/assets/svg/task.svg"
                height="25px"
                class="icon-black"
              /><b>MY</b> Task
            </div>
            <span>
              <button class="task-creator" id="openForm">
                <img src="/assets/svg/plus.svg" height="20px" />Create Task
              </button></span
            >
          </div>

          <div class="card">
            <div class="animations">
              <lottie-player
                src="/assets/json/checkbox.json"
                background="transparent"
                speed="1"
              >
              </lottie-player>
              <img src="/assets/svg/star.svg" class="star" height="28px" alt="" />
            </div>

            <div class="info">
              <div class="tiltle-div">
                <h4>Title:</h4>
                <span>..........</span>
              </div>
              <p>..........................</p>
            </div>
            <div class="box">
              <img
                src="/assets/svg/delete.svg"
                alt=""
                srcset=""
                class="delete-btn"
                id="delete"
              />
            </div>
          </div>
        </div>
        <div class="details" id="titles">
          <div class="contain-card">
            <div class="control-title">
              <label for="input">Title:</label>
              <input type="text" name="title" id="input" />
              <label for="textarea">Information:</label>
              <textarea name="" id="textarea" cols="30" rows="3"></textarea>
              <button type="submit" class="task-creator" id="cbtn">
                Task Created
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="big-container" role="tabpanel" id="four" hidden>
        <h1>Catageory of Task</h1>
      </div>
      <div class="big-container" role="tabpanel" id="five" hidden>
        <h1>Help</h1>
      </div>
    </div>
  </body>
  <script type="module" src="/js/signin.js"></script>
</html>
