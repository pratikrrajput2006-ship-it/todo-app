<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="stylesheet" href="/css/signin.css" />
  </head>
  <body>
    <div class="product-logo">
      <div class="left">
        <lottie-player
          src="/assets/json/to-do-list.json"
          background="transparent"
          speed="1"
          loop
          autoplay
        >
        </lottie-player>
      </div>
      <h1 id="main-logo">To-Do</h1>
    </div>
    <div class="container">
      <div role="tablist" class="bar">
        <div
          role="tab"
          class="tokens"
          aria-controls="one"
          aria-selected="false"
        >
          <img src="/assets/svg/dashbord.svg" height="18px" alt="" srcset="" />
          Dashbord
        </div>
        <div role="tab" class="tokens" aria-controls="two" aria-selected="true">
          <img
            src="/assets/svg/Vital.svg"
            height="18px"
            alt=""
            srcset=""
          />Vital Task
        </div>
        <div
          role="tab"
          class="tokens"
          aria-controls="three"
          aria-selected="false"
        >
          <img src="/assets/svg/task.svg" height="18px" alt="" srcset="" />
          My task
        </div>
        <div
          role="tab"
          class="tokens"
          aria-controls="four"
          aria-selected="false"
        >
          <img src="/assets/svg/cat.svg" height="18px" alt="" srcset="" />
          Task Catagory
        </div>
        <div
          role="tab"
          class="tokens"
          aria-controls="five"
          aria-selected="false"
        >
          <img src="/assets/svg/help.svg" height="18px" alt="" srcset="" />
          Help
        </div>
      </div>
      <div class="big-container" role="tabpanel" id="one" hidden>
        <h1>Data is not Available</h1>
      </div>
      <div class="big-container" role="tabpanel" id="two">
        <div class="details" id="core">
          <div class="core-head">
            <div class="head">
              <img
                src="/assets/svg/Vital.svg"
                height="25px"
                class="icon-black"
                srcset=""
              /><b>Vital</b> Task
            </div>
            <span>
              <img src="/assets/svg/delete.svg" alt="" srcset="" />
              <button id="task-creator">
                <img src="/assets/svg/plus.svg" height="20px" />Create Task
              </button></span
            >
          </div>

          <div class="card">
            <input type="checkbox" name="checkbox" id="checkbox" />
            <div class="info">
              <div class="tiltle-div">
                <h4>Title:</h4>
                <span>Dog</span>
              </div>
              <p>Walk the Dog</p>
            </div>
          </div>
        </div>
        <div class="details" id="titles"></div>
      </div>
      <div class="big-container" role="tabpanel" id="three" hidden>
        <h1>Selected Task</h1>
      </div>
      <div class="big-container" role="tabpanel" id="four" hidden>
        <h1>Catageory of Task</h1>
      </div>
      <div class="big-container" role="tabpanel" id="five" hidden>
        <h1>Help</h1>
      </div>
    </div>
  </body>
  <script src="/js/signin.js"></script>
</html>
